name: CapRover Deploy Frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'web_frontend/**'
      - '.github/workflows/caprover-deploy-frontend.yml'
      - 'scripts/caprover/pack-frontend.sh'
  workflow_dispatch:

concurrency:
  group: caprover-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy frontend to CapRover
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Pack frontend tarball
        env:
          CAPROVER_BACKEND_PUBLIC_HOST: ${{ secrets.CAPROVER_BACKEND_PUBLIC_HOST }}
        run: |
          if [ -z "$CAPROVER_BACKEND_PUBLIC_HOST" ]; then
            echo "Missing CAPROVER_BACKEND_PUBLIC_HOST (hostname only, e.g. iotbackend.yourdomain.com — no https://)"
            exit 1
          fi
          chmod +x scripts/caprover/pack-frontend.sh
          ./scripts/caprover/pack-frontend.sh "$CAPROVER_BACKEND_PUBLIC_HOST"

      - name: Deploy to CapRover
        env:
          CAPROVER_SERVER_URL: ${{ secrets.CAPROVER_SERVER_URL }}
          CAPROVER_FRONTEND_APP: ${{ secrets.CAPROVER_FRONTEND_APP }}
          CAPROVER_FRONTEND_TOKEN: ${{ secrets.CAPROVER_FRONTEND_TOKEN }}
        run: |
          if [ -z "$CAPROVER_SERVER_URL" ] || [ -z "$CAPROVER_FRONTEND_APP" ] || [ -z "$CAPROVER_FRONTEND_TOKEN" ]; then
            echo "Missing required secrets: CAPROVER_SERVER_URL, CAPROVER_FRONTEND_APP, CAPROVER_FRONTEND_TOKEN"
            exit 1
          fi
          caprover deploy \
            -u "$CAPROVER_SERVER_URL" \
            -a "$CAPROVER_FRONTEND_APP" \
            --appToken "$CAPROVER_FRONTEND_TOKEN" \
            --tarFile dist/caprover-frontend.tgz
