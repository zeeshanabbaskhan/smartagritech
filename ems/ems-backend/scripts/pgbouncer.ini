; PgBouncer config example for EMS (P-30)
; Point DATABASE_URL at PgBouncer (port 6432), not Postgres directly.

[databases]
ems = host=127.0.0.1 port=5432 dbname=ems

[pgbouncer]
listen_port = 6432
listen_addr = 127.0.0.1
auth_type = md5
auth_file = userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
reserve_pool_size = 5
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
