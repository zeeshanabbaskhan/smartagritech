# Smart AgriTech EMS — production stack (VPS)
# Usage: copy .env.production.example to .env, edit secrets, then:
#   docker-compose up -d --build

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ems}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ems} -d ${POSTGRES_DB:-ems}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ems_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ems_net

  backend:
    build:
      context: ./ems/ems-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ems}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ems}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ems_net
    # Expose only on localhost if you put another reverse proxy in front
    # ports:
    #   - "127.0.0.1:5000:5000"

  frontend:
    build:
      context: ./web_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ''
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - ems_net

  # Optional: forward MQTT soil sensors to EMS HTTP ingest (enable with --profile mqtt)
  mqtt-bridge:
    profiles: [mqtt]
    build:
      context: .
      dockerfile: Dockerfile.mqtt-bridge
    restart: unless-stopped
    environment:
      MQTT_BROKER_IP: ${MQTT_BROKER_IP:-}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-SMM/Soil_Data}
      EMS_BASE_URL: http://backend:5000/api
      EMS_INGEST_API_KEY: ${INGEST_API_KEY}
      EMS_DEVICE_ID: ${EMS_DEVICE_ID:-}
      EMS_SLAVE_ID: ${EMS_SLAVE_ID:-}
    depends_on:
      - backend
    networks:
      - ems_net

volumes:
  postgres_data:
  redis_data:

networks:
  ems_net:
    driver: bridge
